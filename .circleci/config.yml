version: 2.1

defaults: &defaults
  app-dir: ~/project
  working_directory: ~/project
  docker:
    - image: cimg/base:stable

orbs:
  node: circleci/node@4.2.1

jobs:
  install:
    <<: *defaults
    steps:
      - checkout
      - node/install:
          install-yarn: true
      - run: yarn
  run-examples:
    <<: *defaults
    steps:
      - node/install-packages:
          pkg-manager: yarn
      - run: yarn ts-node-dev examples/lib.ts

workflows:
  install-and-test:
    jobs:
      - install
      - run-examples:
          requires:
            - install
