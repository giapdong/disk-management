version: 2.1

orbs:
  node: circleci/node@4.2.1
  win: circleci/windows@2.4.0

# Idea from vuejs
default-root-dir: &default-root-dir
  working_directory: ~/project/disk
default-workspace: &default-workspace
  - attach_workspace:
      at: ~/project

executors:
  base-executor:
    <<: *default-root-dir
    docker:
      - image: cimg/base:stable
  ubuntu-executor-docker-common:
    <<: *default-root-dir
    docker:
      - image: ubuntu:18.04
  ubuntu-executor-docker-oldest:
    <<: *default-root-dir
    docker:
      - image: ubuntu:14.04
  ubuntu-executor-docker-latest:
    <<: *default-root-dir
    docker:
      - image: ubuntu:latest
  ubuntu-executor-machine:
    <<: *default-root-dir
    machine:
      image: ubuntu-2004:202010-01

commands:
  restore-cache-cmd:
    steps:
      - restore_cache:
          keys:
            - v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
            - v1-disk-{{ .Branch }}-
            - v1-disk-
  save-cache-cmd:
    steps:
      - save_cache:
          key: v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
          paths:
            - node_modules/
  persist-to-workspace:
    steps:
      - persist_to_workspace:
          root: ~/project
          paths:
            - disk
  ubuntu-install-curl:
    steps:
      - run: apt-get update && apt-get install -y curl

  base-install:
    steps:
      - checkout
      - restore-cache-cmd
      - node/install:
          install-yarn: true
      - run: yarn
      - save-cache-cmd
      - persist-to-workspace
  win-install-nodejs:
    steps:
      - run: Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))
      - run: choco install nodejs-lts --version=12.22.0
      - run: choco install yarn
  win-install:
    steps:
      - checkout
      - restore-cache-cmd
      - win-install-nodejs
      - save-cache-cmd

  base-examples:
    steps:
      <<: *default-workspace
      - node/install:
          install-yarn: true
      - run: yarn ts-node-dev examples/lib.ts

jobs:
  base-install-job:
    executor: base-executor
    steps:
      - base-install
  base-examples-job:
    executor: base-executor
    steps:
      - base-examples

  ubuntu-install-job:
    executor: ubuntu-executor-docker-common
    steps:
      - ubuntu-install-curl
      - base-install
  ubuntu-examples-job:
    executor: ubuntu-executor-docker-common
    steps:
      - ubuntu-install-curl
      - base-examples

  win-install-job:
    executor: win/default
    steps:
      - base-install
  win-examples-job:
    executor: win/default
    steps:
      - base-examples
  win-demo:
    executor: win/default
    steps:
      # - win-install
      - run: echo "Success"

workflows:
