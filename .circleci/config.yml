version: 2.1

orbs:
  node: circleci/node@4.2.1

jobs:
  install:
    <<: *defaults
    docker:
      - image: "cimg/base:stable"
    steps:
      - checkout
      - node/install:
          install-yarn: true
      - run: yarn
  run-examples:
    <<: *defaults
    steps:
      - run: yarn ts-node-dev examples/lib.ts

workflows:
  install-and-test:
    jobs:
      - install
      - run-examples:
          requires:
            - install
