version: 2.1

orbs:
  node: circleci/node@4.2.1

base-system: &base-system
  working_directory: ~/project/disk
  docker:
    - image: cimg/base:stable

ubuntu-system: &ubuntu-system
  working_directory: ~/project/disk
  docker:
    - image: ubuntu:18.04

base-install: &base-install
  steps:
    - checkout
    - restore_cache:
        keys:
          - v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
          - v1-disk-{{ .Branch }}-
          - v1-disk-
    - node/install:
        install-yarn: true
    - run: yarn
    - save_cache:
        key: v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
        paths:
          - node_modules/
    - persist_to_workspace:
        root: ~/project
        paths:
          - disk

base-examples: &base-examples
  steps:
    - attach_workspace:
        at: ~/project
    - node/install:
        install-yarn: true
    - run: yarn ts-node-dev examples/lib.ts

commands:
  restore-cache-cmd:
    steps:
      keys:
        - v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
        - v1-disk-{{ .Branch }}-
        - v1-disk-
  save-cache-cmd:
    steps:
      - save_cache:
        key: v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
        paths:
          - node_modules/
  persist-to-workspace:
    steps:
      - persist_to_workspace:
        root: ~/project
        paths:
          - disk

  base-install:
    steps:
      - checkout
      - restore-cache-cmd
      - node/install:
          install-yarn: true
      - run: yarn
      - save-cache-cmd
      - persist-to-workspace

  base-examples:
    steps:
      - attach_workspace:
          at: ~/project
      - node/install:
          install-yarn: true
      - run: yarn ts-node-dev examples/lib.ts

jobs:
  base-install-job:
    <<: *base-system
    steps:
      - base-install

  base-examples-job:
    <<: *base-system
    <<: *base-examples

  ubuntu-install-job:
    <<: *ubuntu-system
    <<: *base-install

  ubuntu-examples-job:
    <<: *ubuntu-system
    <<: *base-examples

workflows:
  test-base-system:
    jobs:
      - base-install-job
      - base-examples-job:
          requires:
            - base-install-job
