version: 2.1

executors:
  bionic-executor-common:
    docker:
      - image: ubuntu:bionic
        auth:
          username: mydockerhub-user
          password: $DOCKERHUB_PASSWORD # context / project UI env-var reference

jobs:
  test:
    parameters:
      e:
        type: executor
    executor: << parameters.e >>
    steps:
      - run: echo "Success"

workflows:
  workflow:
    jobs:
      - test:
          e: bionic-executor-common
