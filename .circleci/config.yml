version: 2.1

default-root-dir: &default-root-dir
  working_directory: ~/project/disk

executors:
  bionic-executor-common:
    docker:
      - image: ubuntu:bionic
  base-executor:
    <<: *default-root-dir
    docker:
      - image: cimg/base:stable

jobs:
  test:
    parameters:
      e:
        type: executor
    executor: << parameters.e >>
    steps:
      - run: echo "Success"

workflows:
  workflow:
    jobs:
      - test:
          e: base-executor
