version: 2.1

orbs:
  node: circleci/node@4.2.1

# Idea from vuejs
default-root-dir: &default-root-dir
  working_directory: ~/project/disk

executors:
  base-executor:
    <<: *default-root-dir
    docker:
      - image: cimg/base:stable
  ubuntu-executor:
    <<: *default-root-dir
    docker:
      - image: ubuntu:18.04
        command: [ls]
        command: [ls, -l]

commands:
  restore-cache-cmd:
    steps:
      - restore_cache:
          keys:
            - v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
            - v1-disk-{{ .Branch }}-
            - v1-disk-
  save-cache-cmd:
    steps:
      - save_cache:
          key: v1-disk-{{ .Branch }}-{{ checksum "yarn.lock" }}
          paths:
            - node_modules/
  persist-to-workspace:
    steps:
      - persist_to_workspace:
          root: ~/project
          paths:
            - disk

  base-install:
    steps:
      - checkout
      - restore-cache-cmd
      - node/install:
          install-yarn: true
      - run: yarn
      - save-cache-cmd
      - persist-to-workspace

  base-examples:
    steps:
      - attach_workspace:
          at: ~/project
      - node/install:
          install-yarn: true
      - run: yarn ts-node-dev examples/lib.ts

jobs:
  base-install-job:
    executor: base-executor
    steps:
      - base-install
  base-examples-job:
    executor: base-executor
    steps:
      - base-examples

  ubuntu-install-job:
    executor: ubuntu-executor
    steps:
      - base-install
  ubuntu-examples-job:
    executor: ubuntu-executor
    steps:
      - base-examples

workflows:
  test-base-system:
    jobs:
      - base-install-job
      - base-examples-job:
          requires:
            - base-install-job
  test-ubuntu-system:
    jobs:
      - ubuntu-install-job
      - ubuntu-examples-job:
          requires:
            - ubuntu-install-job
